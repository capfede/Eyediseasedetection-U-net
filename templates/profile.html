<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Eye Medicore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFFFFF;
        }

        .header {
            background-color: #8B1538;
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background-color: #8B1538;
            border-color: #8B1538;
        }

        .btn-primary:hover {
            background-color: #A91D3A;
            border-color: #A91D3A;
        }

        .btn-warning {
            background-color: #D4AF37;
            border-color: #D4AF37;
            color: black;
        }

        .btn-warning:hover {
            background-color: #B8860B;
            border-color: #B8860B;
        }

        .btn-danger {
            background-color: #A91D3A;
            border-color: #A91D3A;
        }

        .btn-danger:hover {
            background-color: #8B1538;
            border-color: #8B1538;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="container d-flex justify-content-between align-items-center">
            <h2>User Profile</h2>
            <a href="/" class="btn btn-outline-light btn-sm">Back to Home</a>
        </div>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-4">
                    <h4>Change Username</h4>
                    <form action="/update_username" method="POST">
                        <div class="mb-3">
                            <label class="form-label">New Username</label>
                            <input type="text" class="form-control" name="new_username"
                                value="{{ current_user.username }}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Username</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card p-4">
                    <h4>Update Password</h4>
                    <form action="/update_password" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control" name="old_password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" name="new_password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Change Password</button>
                    </form>
                    <div class="mt-3">
                        <a href="/forgot_password" class="btn btn-warning btn-sm">Request OTP for Reset</a>
                        <a href="/verify_otp" class="btn btn-info btn-sm">Enter OTP</a>
                        <a href="/reset_password" class="btn btn-danger btn-sm">Reset Final</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
