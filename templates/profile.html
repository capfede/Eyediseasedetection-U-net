{% extends "base_dashboard.html" %}

{% block title %}Profile{% endblock %}

{% block page_title %}My Profile Settings{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header bg-maroon">
                <h5 class="mb-0 text-white"><i class="fas fa-user-edit me-2"></i>Personal Details</h5>
            </div>
            <div class="card-body">
                <form action="/profile/change_username" method="POST" data-confirm="Are you sure you want to update your username?">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="new_username" value="{{ current_user.username }}"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Username</button>
                    <div class="form-text mt-2"><i class="fas fa-info-circle me-1"></i>Requires email verification
                        (OTP).</div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header bg-maroon">
                <h5 class="mb-0 text-white"><i class="fas fa-shield-alt me-2"></i>Security</h5>
            </div>
            <div class="card-body">
                <form action="/profile/change_password" method="POST">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" name="new_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Change Password</button>
                    <div class="form-text mt-2"><i class="fas fa-info-circle me-1"></i>OTP will be sent to your
                        registered email.</div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
