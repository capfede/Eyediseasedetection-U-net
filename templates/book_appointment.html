<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Eye Medicore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .booking-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            border: 1px solid #D4AF37;
        }

        .btn-book {
            background: #8B1538;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            border: none;
        }

        .btn-book:hover {
            background-color: #A91D3A;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center">
        <div class="booking-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Book Appointment</h2>
                <p class="text-muted">Schedule a clinical consultation</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/book_appointment" method="POST">
                <div class="mb-3">
                    <label class="form-label">Select Patient</label>
                    <select class="form-select" name="patient_id" required>
                        <option value="">Choose a patient...</option>
                        {% for patient in patients %}
                        <option value="{{ patient.id }}">{{ patient.name }} (#{{ patient.id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Appointment Date</label>
                        <input type="date" class="form-control" name="appointment_date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Appointment Time</label>
                        <input type="time" class="form-control" name="appointment_time" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea class="form-control" name="notes" rows="3"
                        placeholder="Symptoms or specific requests"></textarea>
                </div>
                <button type="submit" class="btn btn-book w-100">Confirm Booking</button>
            </form>
            <div class="text-center mt-3">
                <a href="/appointments" class="text-decoration-none">View All Appointments</a>
            </div>
        </div>
    </div>
</body>

</html>
