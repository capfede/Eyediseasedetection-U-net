{% extends "base_dashboard.html" %}

{% block title %}Book Appointment{% endblock %}

{% block page_title %}Schedule Consultation{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-calendar-alt me-2"></i>Appointment Booking</h5>
    </div>
    <div class="card-body">
        <form action="/book_appointment" method="POST">
            <div class="mb-3">
                <label class="form-label">Select Patient</label>
                <select class="form-select" name="patient_id" required>
                    <option value="">Choose a patient...</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}" {% if selected_patient_id|string==patient.id|string %}selected{%
                        endif %}>
                        {{ patient.name }} (#{{ patient.id }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Appointment Date</label>
                    <input type="date" class="form-control" name="appointment_date" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary px-5">Confirm Booking</button>
        </form>
    </div>
</div>
{% endblock %}
