<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Eye Medicore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFFFFF;
        }

        .header {
            background-color: #8B1538;
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .btn-primary {
            background-color: #8B1538;
            border-color: #8B1538;
        }

        .btn-primary:hover {
            background-color: #A91D3A;
            border-color: #A91D3A;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="container d-flex justify-content-between align-items-center">
            <h2>Edit User</h2>
            <a href="/admin/view_user/{{ user.id }}" class="btn btn-light btn-sm">Back to Profile</a>
        </div>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="card p-4">
            <h4 class="mb-4">Edit User: {{ user.username }}</h4>
            <form action="/admin/edit_user/{{ user.id }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" name="phone_number"
                        value="{{ user.phone_number if user.phone_number else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="role" required>
                        <option value="doctor" {% if user.role=='doctor' %}selected{% endif %}>Doctor</option>
                        <option value="staff" {% if user.role=='staff' %}selected{% endif %}>Staff</option>
                        <option value="it_expert" {% if user.role=='it_expert' %}selected{% endif %}>IT Expert</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/admin/view_user/{{ user.id }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
