{% extends "base_dashboard.html" %}

{% block title %}Edit User{% endblock %}

{% block page_title %}Update User Details{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-edit me-2"></i>Modify User Profile: {{ user.username }}</h5>
    </div>
    <div class="card-body">
        <form action="/admin/edit_user/{{ user.id }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email"
                        value="{{ user.email if user.email else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" name="phone_number"
                        value="{{ user.phone_number if user.phone_number else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="role" id="edit_role_select" required {% if user.id==current_user.id %}disabled{% endif
                        %}>
                        <option value="doctor" {% if user.role=='doctor' %}selected{% endif %}>Doctor</option>
                        <option value="staff" {% if user.role=='staff' %}selected{% endif %}>Staff</option>
                        <option value="it_expert" {% if user.role=='it_expert' %}selected{% endif %}>IT Expert</option>
                    </select>
                </div>
            </div>
            <div class="row" id="doctor-select-row" style="display: {% if user.role == 'staff' %}flex{% else %}none{% endif %};">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Assign Doctor</label>
                    <select class="form-select" name="doctor_id" id="edit_doctor_select" {% if user.role == 'staff' %}required{% endif %}>
                        <option value="">-- Select --</option>
                        {% for doctor in doctors %}
                        <option value="{{ doctor.id }}" {% if user.doctor_id == doctor.id %}selected{% endif %}>Dr. {{ doctor.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="text-end mt-3">
                <a href="/admin/view_user/{{ user.id }}" class="btn btn-secondary px-4 me-2">Cancel</a>
                <button type="submit" class="btn btn-primary px-5">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var roleSelect = document.getElementById('edit_role_select');
    var doctorRow = document.getElementById('doctor-select-row');
    var doctorSelect = document.getElementById('edit_doctor_select');
    
    if (roleSelect) {
        roleSelect.addEventListener('change', function() {
            if (this.value === 'staff') {
                doctorRow.style.display = 'flex';
                doctorSelect.required = true;
            } else {
                doctorRow.style.display = 'none';
                doctorSelect.required = false;
                doctorSelect.value = '';
            }
        });
    }
});
</script>
{% endblock %}
