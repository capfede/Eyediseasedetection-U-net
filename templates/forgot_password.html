<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Eye Medicore</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_style.css') }}">
</head>

<body class="auth-bg">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="text-maroon fw-bold">Forgot Password</h2>
            <p class="text-muted">Enter email to receive OTP</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/forgot_password" method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send OTP</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none text-muted small">Back to Login</a>
        </div>
    </div>
</body>

</html>
