{% extends "base_dashboard.html" %}

{% block title %}Promote Staff{% endblock %}

{% block page_title %}Upgrade Permissions{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-user-graduate me-2"></i>Grant Doctor Privileges</h5>
    </div>
    <div class="card-body">
        <form action="/promote-staff" method="POST">
            <div class="mb-4">
                <label class="form-label">Select Staff Member</label>
                <select class="form-select" name="staff_id" required>
                    <option value="">Choose a candidate...</option>
                    {% for single_staff in staff %}
                    <option value="{{ single_staff.id }}">{{ single_staff.username }} (ID: {{ single_staff.id }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-2"></i>Promoting a staff member will grant them access to diagnosis
                tools and patient histories.
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-primary px-5">Promote Selected Staff</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
