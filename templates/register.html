{% extends "base_dashboard.html" %}

{% block title %}Register Patient{% endblock %}

{% block page_title %}Patient Registration{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-user-plus me-2"></i>New Patient Details</h5>
    </div>
    <div class="card-body">
        <form action="/register" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter patient name" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" name="age" placeholder="Age" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-select" name="blood_group">
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Place/City</label>
                    <input type="text" class="form-control" name="place" placeholder="City" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" name="phone" placeholder="Contact number" required>
                </div>
                {% if current_user.role != 'staff' %}
                <div class="col-md-3 mb-3">
                    <label class="form-label">Assign Doctor</label>
                    <select class="form-select" name="doctor_id" id="doctor_id_select">
                        <option value="">Not Assigned</option>
                        {% for doctor in doctors %}
                        <option value="{{ doctor.id }}">Dr. {{ doctor.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Assign Staff</label>
                    <select class="form-select" name="staff_id" id="staff_id_select">
                        <option value="">None</option>
                        {% for staff in all_staff %}
                        <option value="{{ staff.id }}" data-doctor="{{ staff.doctor_id }}" style="display:none;" disabled>{{ staff.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
            </div>
            <div class="text-end mt-3">
                <button type="submit" class="btn btn-primary px-5">Complete Registration</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var doctorSelect = document.getElementById('doctor_id_select');
    var staffSelect = document.getElementById('staff_id_select');
    
    if (doctorSelect && staffSelect) {
        doctorSelect.addEventListener('change', function() {
            var selectedDoctor = doctorSelect.value;
            var staffOptions = staffSelect.querySelectorAll('option[data-doctor]');
            
            // Reset staff selection when doctor changes
            staffSelect.value = "";
            
            staffOptions.forEach(function(opt) {
                if (opt.getAttribute('data-doctor') === selectedDoctor && selectedDoctor !== "") {
                    opt.style.display = 'block';
                    opt.disabled = false;
                } else {
                    opt.style.display = 'none';
                    opt.disabled = true;
                }
            });
        });
    }
});
</script>
{% endblock %}
