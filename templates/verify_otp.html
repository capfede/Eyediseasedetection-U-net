<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Eye Medicore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_style.css') }}">
</head>

<body class="auth-bg">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="text-maroon fw-bold">Verify OTP</h2>
            <p class="text-muted">Check your email for the 6-digit code</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/verify_otp" method="POST">
            <div class="mb-3">
                <label class="form-label">Enter OTP</label>
                <input type="text" class="form-control text-center" name="otp" maxlength="6" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Verify OTP</button>
        </form>
    </div>
</body>

</html>
